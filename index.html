<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anarchic — Coming Soon</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0f;
            color: #e0e0e0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }
        .container {
            text-align: center;
            padding: 2rem;
        }
        .glitch {
            font-size: 6rem;
            font-weight: 900;
            background: linear-gradient(135deg, #00f260, #0575e6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: pulse 3s ease-in-out infinite;
        }
        .tagline {
            font-size: 1.5rem;
            color: #666;
            margin: 1rem 0 2rem;
            letter-spacing: 0.5em;
            text-transform: uppercase;
        }
        .status {
            display: inline-block;
            padding: 0.5rem 2rem;
            border: 1px solid #00f260;
            color: #00f260;
            border-radius: 50px;
            font-size: 0.9rem;
            letter-spacing: 0.2em;
            margin-bottom: 3rem;
        }
        .progress {
            width: 300px;
            height: 4px;
            background: #1a1a2e;
            border-radius: 2px;
            margin: 2rem auto;
            overflow: hidden;
        }
        .progress-bar {
            width: 25%;
            height: 100%;
            background: linear-gradient(90deg, #00f260, #0575e6);
            border-radius: 2px;
            animation: loading 2s ease-in-out infinite;
        }
        .footer {
            margin-top: 4rem;
            color: #333;
            font-size: 0.8rem;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.8; }
        }
        @keyframes loading {
            0%, 100% { transform: translateX(0); }
            50% { transform: translateX(200px); }
        }
        @media (max-width: 600px) {
            .glitch { font-size: 3rem; }
            .tagline { font-size: 1rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="glitch">ANARCHIC</div>
        <div class="tagline">OSINT · DB SEARCHER</div>
        <div class="status">🔒 EN DÉVELOPPEMENT</div>
        <p style="color: #555; max-width: 400px; margin: 0 auto; line-height: 1.8;">
            Outil OSINT de recherche de bases de données.<br>
            Windows · Linux · Puissant · Rapide
        </p>
        <div class="progress">
            <div class="progress-bar"></div>
        </div>
        <p style="color: #444; font-size: 0.9rem;">Alpha — 25%</p>
        <div class="footer">
            <p>© 2026 Anarchic by Styler</p>
            <p style="margin-top: 0.5rem;">
                <a href="#" style="color: #333; text-decoration: none; margin: 0 1rem;">GitHub</a>
                <a href="#" style="color: #333; text-decoration: none; margin: 0 1rem;">Documentation</a>
            </p>
        </div>
    </div>
</body>
</html>
